<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="./styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;400;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finn</title>
</head>
<body>
    <div class="text">
        <h1>Bem Vinde!</h1>
        <p>Embarque nesta aventura. Faça seu login!</p>
    </div>
    <div class="head">
        <div class="earLeft"></div>
        <div class="earRight"></div>    
        <div class="face">
            <Div class="eyes">
                <div class="leftEye">
                    <div class="light1"></div>
                </div>
                <div class="rightEye">
                    <div class="light2"></div>
                </div>
            </Div>
            <div class="mouth">
                <form action="#">
                    <input class="teethUp" type="text" name="UserName" id="#" placeholder="Nome de usuário">
                    <input class="teethDown" type="password" name="UserEmail" id="#" placeholder="Senha">
                </form>
            </div>
        </div>
    </div>
    <div class="body">
        <button value="submit">Entrar</button>
    </div>
    <div class="bag">
        <div class="detail"></div>
    </div>
</body>
</html>
